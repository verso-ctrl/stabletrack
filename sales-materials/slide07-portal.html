<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body class="col bg-surface" style="width: 960px; height: 540px; padding: 32px 40px;">
  <div style="width: 880px;" class="fit">
    <p class="text-sm text-primary" style="margin: 0; font-weight: 600; letter-spacing: 2px;">FEATURE</p>
    <h1 class="text-3xl text-surface-foreground" style="margin: 8px 0 0 0;">Keep Clients Informed</h1>
  </div>
  
  <div class="fill-height row" style="margin-top: 20px; gap: 24px;">
    <!-- Portal mockup -->
    <div class="col" style="flex: 1;">
      <div style="background: #fafaf9; border-radius: 12px; padding: 16px;">
        <div class="row" style="gap: 10px; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #e7e5e4; padding-bottom: 10px;">
          <div style="width: 32px; height: 32px; background: #f59e0b; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
            <p style="font-size: 16px; margin: 0;">🐴</p>
          </div>
          <div>
            <p style="margin: 0; color: #1c1917; font-weight: 600; font-size: 12px;">Meadowbrook Stables</p>
            <p style="margin: 0; color: #78716c; font-size: 10px;">Client Portal</p>
          </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div style="background: #fef3c7; padding: 10px; border-radius: 6px;">
            <p style="margin: 0; color: #92400e; font-size: 18px; font-weight: 700;">2</p>
            <p style="margin: 0; color: #92400e; font-size: 10px;">My Horses</p>
          </div>
          <div style="background: #fee2e2; padding: 10px; border-radius: 6px;">
            <p style="margin: 0; color: #991b1b; font-size: 18px; font-weight: 700;">$450</p>
            <p style="margin: 0; color: #991b1b; font-size: 10px;">Balance Due</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Benefits -->
    <div class="col" style="flex: 1.2; gap: 12px;">
      <div style="background: #292524; border-radius: 12px; padding: 16px;">
        <p class="text-base text-primary" style="margin: 0; font-weight: 600;">Their Horses</p>
        <p class="text-sm text-muted-foreground" style="margin: 6px 0 0 0;">Photos, health records, vaccinations, coggins status.</p>
      </div>
      
      <div style="background: #292524; border-radius: 12px; padding: 16px;">
        <p class="text-base text-primary" style="margin: 0; font-weight: 600;">Their Invoices</p>
        <p class="text-sm text-muted-foreground" style="margin: 6px 0 0 0;">Clear view of what they owe. No more confusion.</p>
      </div>
      
      <div style="background: #292524; border-radius: 12px; padding: 16px;">
        <p class="text-base text-primary" style="margin: 0; font-weight: 600;">Their Schedule</p>
        <p class="text-sm text-muted-foreground" style="margin: 6px 0 0 0;">Upcoming vet visits, farrier appointments.</p>
      </div>
    </div>
  </div>
</body>
</html>
